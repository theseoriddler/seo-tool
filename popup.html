<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SERP Analyzer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SERP Feature Analyzer</h1>
      <a id="settings-link" href="#" title="Settings">&#9881;</a>
    </div>
    <div id="no-key" class="hidden">
      <p class="info-text">Add your SerpAPI key to get started.</p>
      <button id="open-settings">Open Settings</button>
    </div>
    <div id="error" class="error hidden"></div>
    <div id="chart-area" class="hidden">
      <svg id="pie" viewBox="-1.2 -1.2 2.4 2.4" width="220" height="220"></svg>
      <ul id="legend"></ul>
    </div>
    <div id="loading" class="hidden">Analyzing SERP...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
